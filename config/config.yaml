artifacts_root: artifacts

# ── Data Ingestion ────────────────────────────────────────────────────────────
data_ingestion:
  root_dir: artifacts/data_ingestion
  prometheus_url: http://localhost:9090
  lookback_hours: 24
  scrape_interval: 30
  raw_metrics_file: artifacts/data_ingestion/raw_metrics.csv
  train_data_path: artifacts/data_ingestion/train.csv
  test_data_path: artifacts/data_ingestion/test.csv
  use_simulator: true
  simulator_samples: 2000

# ── Prepare Base Model ────────────────────────────────────────────────────────
prepare_base_model:
  root_dir: artifacts/prepare_base_model
  base_model_path: artifacts/prepare_base_model/base_model.joblib
  updated_base_model_path: artifacts/prepare_base_model/updated_base_model.joblib

# ── Model Trainer ─────────────────────────────────────────────────────────────
model_trainer:
  root_dir: artifacts/model_trainer
  train_data_path: artifacts/data_ingestion/train.csv
  test_data_path: artifacts/data_ingestion/test.csv
  model_name: anomaly_detector.joblib
  feature_columns:
    - cpu_usage_pct
    - memory_usage_pct
    - pod_restart_count
    - request_latency_p99_ms
    - error_rate_pct
    - network_bytes_in
    - network_bytes_out
    - disk_io_read_mbps
    - disk_io_write_mbps
    - pod_pending_count
    - node_not_ready_count

# ── Model Evaluation ──────────────────────────────────────────────────────────
model_evaluation:
  root_dir: artifacts/model_evaluation
  test_data_path: artifacts/data_ingestion/test.csv
  model_path: artifacts/model_trainer/anomaly_detector.joblib
  metric_file_name: artifacts/model_evaluation/metrics.json
  all_params: config/params.yaml
  mlflow_uri: sqlite:///Users/nandak/Downloads/MLOPS-poc/mlflow.db
  labelled_data_path: artifacts/data_ingestion/labelled_anomalies.csv
