apiVersion: v1
kind: Service
metadata:
  name: mlops-monitoring-api
  namespace: mlops-monitoring
spec:
  selector:
    app: mlops-monitoring-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow-server
  namespace: mlops-monitoring
spec:
  selector:
    app: mlflow-server
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mlops-ingress
  namespace: mlops-monitoring
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: mlops.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mlops-monitoring-api
                port:
                  number: 80
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: mlflow-server
                port:
                  number: 5000
